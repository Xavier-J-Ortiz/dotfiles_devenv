# Enable extended keys support
set -g extended-keys on
set -s extended-keys on
# Tell tmux your terminal supports extended keys
set -as terminal-features 'xterm*:extkeys'

# Version check required, otherwise work laptop will complain on a tmux session
run-shell 'export TMUX_VERSION=$(tmux -V | cut -d" " -f2); if [ "$(echo "$TMUX_VERSION < 3.5" | bc)" -eq 1 ]; then tmux set-environment -g TMUX_VERSION_TOO_LOW 1; fi'
# Use CSI u format
if '[ -z "$TMUX_VERSION_TOO_LOW" ]' 'set -g extended-keys-format csi-u'

# Start non-login shell, doesn't double post keychain
set -g default-command "${SHELL}"
set -g default-terminal "tmux-256color"
set-option -ga terminal-features ",xterm-256color:RGB"

# tmux status via PowerKit
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_theme 'github'
set -g @powerkit_theme_variant 'dark'
set -g @powerkit_plugins "ssh,weather,datetime,battery,cpu,memory,hostname,git"

# Weather configuration - explicit location (ZIP code for privacy)
set -g @powerkit_plugin_weather_location "10901"
set -g @powerkit_plugin_weather_units "u"        # Fahrenheit
set -g @powerkit_plugin_weather_format "compact"
set -g @powerkit_plugin_weather_cache_ttl "3600"   # 1 hour
set -g @powerkit_plugin_weather_max_requests_per_hour "120"

# Datetime configuration - short weekday, US date, 24-hour time
set -g @powerkit_plugin_datetime_format "%a %m/%d/%y %H:%M"

# Initialize TPM (keep at bottom)
run '/usr/share/tmux-plugin-manager/tpm'

# Change binding to C-a instead of C-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix
